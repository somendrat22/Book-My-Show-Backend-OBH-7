<!DOCTYPE html>
<html>
<head>
    <title>Theater Owner Signup</title>
    <link rel="stylesheet" href="./css/style.css">
</head>
<body>

<div class="form-container">
    <h2>Theater Owner Signup</h2>

    <form>

        <input type="text" placeholder="Owner Name" required>

        <input type="email" placeholder="Email" required>

        <input type="tel" placeholder="Mobile Number" required>

        <input type="password" placeholder="Password" required>

        <input type="text" placeholder="Theater Name" required>

        <input type="text" placeholder="License Number" required>

        <textarea placeholder="Address"></textarea>

        <input type="text" placeholder="City" required>

        <button type="submit">Register Theater</button>

    </form>
</div>

</body>
</html>
